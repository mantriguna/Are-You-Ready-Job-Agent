name: Render Daily WhatsApp Trigger

on:
  workflow_dispatch:
  schedule:
    # 8:00 PM Asia/Kolkata in UTC.
    - cron: "30 14 * * *"

jobs:
  trigger-render-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: render-daily-whatsapp-trigger
      cancel-in-progress: false

    steps:
      - name: Validate cron secret
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET GitHub Actions secret is missing"
            exit 1
          fi

      - name: Trigger Render daily WhatsApp job
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --show-error --silent \
            "https://are-you-ready-job-agent.onrender.com/cron/keepalive-supabase?token=${CRON_SECRET}"
          echo
          sleep 10
          curl --fail --show-error --silent \
            "https://are-you-ready-job-agent.onrender.com/cron/daily-whatsapp?token=${CRON_SECRET}&limit=15&max_evaluations=25&threshold=75&recent_days=1"
