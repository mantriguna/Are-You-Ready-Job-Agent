name: Daily AI Job Search

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without sending WhatsApp messages"
        required: false
        default: "false"
      limit:
        description: "Maximum jobs to send"
        required: false
        default: "15"
      max_evaluations:
        description: "Maximum jobs to evaluate"
        required: false
        default: "25"
      threshold:
        description: "Minimum resume match score"
        required: false
        default: "75"
      recent_days:
        description: "Search jobs posted within this many days"
        required: false
        default: "1"
  schedule:
    # 8:00, 8:07, and 8:14 PM Asia/Kolkata in UTC.
    - cron: "30 14 * * *"
    - cron: "37 14 * * *"
    - cron: "44 14 * * *"

jobs:
  run-job-search:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: daily-ai-job-search
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_PHONE_NUMBER_ID: ${{ secrets.META_PHONE_NUMBER_ID }}
          META_WABA_ID: ${{ secrets.META_WABA_ID }}
        run: |
          missing=0
          for name in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY GEMINI_API_KEY META_ACCESS_TOKEN META_PHONE_NUMBER_ID META_WABA_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name GitHub Actions secret is missing"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run scheduled search
        shell: bash
        env:
          APP_TIMEZONE: Asia/Kolkata
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
          GEMINI_FALLBACK_MODEL: gemini-2.5-flash-lite
          ENABLE_HEURISTIC_AI_FALLBACK: "true"
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_PHONE_NUMBER_ID: ${{ secrets.META_PHONE_NUMBER_ID }}
          META_WABA_ID: ${{ secrets.META_WABA_ID }}
          META_GRAPH_API_VERSION: v25.0
          USE_WHATSAPP_TEMPLATES: "true"
          WHATSAPP_JOB_TEMPLATE_NAME: job_match_alert
          WHATSAPP_DAILY_SUMMARY_TEMPLATE_NAME: daily_job_summary
          WHATSAPP_NO_MATCH_TEMPLATE_NAME: daily_no_match
          WHATSAPP_TEMPLATE_LANGUAGE: en_US
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_JOBS_HOST: jsearch.p.rapidapi.com
          ENABLE_AMAZON_JOBS: "true"
          PREFERRED_JOB_QUERIES: SDE-1,Software Development Engineer,Backend Engineer,Python Developer,Java Developer
          JOB_EVALUATION_POOL_LIMIT: ${{ github.event.inputs.max_evaluations || '25' }}
          MAX_EVALUATIONS_PER_RUN: ${{ github.event.inputs.max_evaluations || '25' }}
          FILL_DAILY_LIMIT_WITH_LOWER_MATCHES: "true"
          SEND_ALL_ABOVE_THRESHOLD_MATCHES: "true"
          CHAT_LATEST_JOB_LIMIT: "15"
          CHAT_LATEST_JOB_MAX_EVALUATIONS: "25"
          CHAT_LATEST_JOB_THRESHOLD: "75"
          CHAT_LATEST_JOB_RECENT_DAYS: "1"
          SENT_JOB_RETENTION_DAYS: "60"
          SEND_NO_RESULT_SUMMARY: "true"
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run || 'false' }}
          LIMIT_INPUT: ${{ github.event.inputs.limit || '15' }}
          MAX_EVALUATIONS_INPUT: ${{ github.event.inputs.max_evaluations || '25' }}
          THRESHOLD_INPUT: ${{ github.event.inputs.threshold || '75' }}
          RECENT_DAYS_INPUT: ${{ github.event.inputs.recent_days || '1' }}
        run: |
          args=(
            --limit "$LIMIT_INPUT"
            --max-evaluations "$MAX_EVALUATIONS_INPUT"
            --threshold "$THRESHOLD_INPUT"
            --recent-days "$RECENT_DAYS_INPUT"
            --override-hour 20
          )

          if [ "$DRY_RUN_INPUT" = "true" ]; then
            args+=(--dry-run)
          fi

          python scripts/run_scheduled_search.py "${args[@]}"
