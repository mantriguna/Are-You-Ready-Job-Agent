services:
  - type: web
    name: ai-job-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: META_GRAPH_API_VERSION
        value: v25.0
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_FALLBACK_MODEL
        value: gemini-2.5-flash-lite
      - key: SCHEDULER_MAX_CONCURRENCY
        value: "3"
      - key: MIN_MATCH_SCORE
        value: "75"
      - key: MAX_MATCHED_JOBS_PER_USER
        value: "0"
      - key: MAX_PAGES_PER_SOURCE
        value: "0"
      - key: JOB_SOURCE_CONCURRENCY
        value: "5"
      - key: HTTP_TIMEOUT_SECONDS
        value: "30"
      - key: JOB_EVALUATION_POOL_LIMIT
        value: "0"
      - key: MAX_EVALUATIONS_PER_RUN
        value: "0"
      - key: ENABLE_OFFICIAL_COMPANY_SOURCES
        value: "true"
      - key: ALLOW_BELOW_THRESHOLD_FILL
        value: "false"
